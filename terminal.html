<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal — Rainier Pearson Saputra</title>
  <link rel="stylesheet" href="css/terminal.css">
  <link rel="icon"
    href="https://raw.githubusercontent.com/Rainier-PS/rainier-ps.github.io/main/images/site/Rainier%20Pearson%20Saputra-Favicon.svg"
    type="image/svg+xml" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self'; font-src 'self'; img-src 'self' https://raw.githubusercontent.com; connect-src 'self' https://raw.githubusercontent.com https://github-contributions-api.jogruber.de; base-uri 'self'; form-action 'self'" />
</head>
<body class="terminal-body">
  <div id="terminal" class="terminal">
    <div id="terminal-output" class="terminal-output" role="log" aria-live="polite" tabindex="0"></div>
    <div class="terminal-input-line">
      <span id="prompt" class="prompt"></span>
      <input id="terminal-input" class="terminal-input" type="text" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" aria-label="Terminal input" />
    </div>
  </div>
  <script src="js/terminal.js"></script>
</body>
</html>
